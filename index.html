<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HappyCrops AI — Digital Crop Expert</title>
    <meta name="description" content="AI-powered crop disease diagnostics for smallholder farmers. Snap a photo. Get an instant diagnosis. Protect your yield." />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @media print {
            /* Hide all navigation and chrome */
            header, nav, footer,
            .print\:hidden,
            [title="Share Report"],
            [title="Download as PDF"],
            [title="Delete Report"] {
                display: none !important;
            }
            /* Remove sidebar offset */
            main {
                margin-left: 0 !important;
                padding: 0 !important;
            }
            body, html {
                background: #0c1512 !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            /* Force page to use full width */
            .md\:ml-64 {
                margin-left: 0 !important;
            }
            /* Avoid page breaks mid-card */
            section, .rounded-xl, .rounded-2xl {
                break-inside: avoid;
            }
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
